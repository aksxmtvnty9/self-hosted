services:
  silverbullet:
    image: zefhemel/silverbullet:latest
    restart: unless-stopped
    environment:
      - SB_USER=${SB_USER_NAME}:${SB_USER_PASSWORD}
      - SB_PORT=8012
    volumes:
      - $HOME/Documents/tech-codex:/space
    ports:
      - 8012:8012

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
